<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для нашего канала | Hub</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #161b22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; display: flex; height: 100vh; }
        
        /* Профиль */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid var(--primary); }

        /* Чат */
        .sidebar { width: 320px; background: #0d1117; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; background: var(--card); border-bottom: 1px solid #30363d; font-weight: bold; color: var(--primary); }
        .chat-box { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #21262d; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; }
        .msg b { color: var(--primary); display: block; margin-bottom: 3px; }
        .input-area { padding: 15px; border-top: 1px solid #30363d; }

        /* Контент */
        .main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .link-card { background: #21262d; border-radius: 10px; padding: 15px; margin-top: 15px; border: 1px solid #30363d; }
        .preview-img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; max-height: 300px; object-fit: contain; }
        
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { background: var(--primary); color: #000; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Введите ваш ник</h2>
            <input type="text" id="username-input" placeholder="Ваше имя..." onkeydown="if(event.key==='Enter') setUsername()">
            <button class="btn" onclick="setUsername()">Войти</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="chat-header">Чат: <span id="my-nick-display">...</span></div>
        <div class="chat-box" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="chat-msg" placeholder="Напишите и нажмите Enter..." onkeydown="if(event.key==='Enter') sendChat()">
        </div>
    </aside>

    <main class="main">
        <h1>Для нашего канала</h1>
        
        <div class="section">
            <h3>Поделиться ссылкой</h3>
            <input type="text" id="link-input" placeholder="Вставьте ссылку на файл или фото и нажмите Enter..." onkeydown="if(event.key==='Enter') addLink()">
            <p style="font-size: 0.8rem; color: #8b949e;">* Если ссылка на картинку, она подгрузится автоматически.</p>
        </div>

        <div id="links-container">
            </div>
    </main>

    <script>
        let userName = "";

        // Установка ника
        function setUsername() {
            const input = document.getElementById('username-input');
            if (input.value.trim() !== "") {
                userName = input.value.trim();
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('my-nick-display').innerText = userName;
            }
        }

        // Отправка сообщения в чат (через Enter)
        function sendChat() {
            const input = document.getElementById('chat-msg');
            const chatBox = document.getElementById('chat-box');
            if (input.value.trim() !== "") {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg';
                msgDiv.innerHTML = `<b>${userName}</b> ${input.value}`;
                chatBox.appendChild(msgDiv);
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Добавление ссылки с картинкой (через Enter)
        function addLink() {
            const input = document.getElementById('link-input');
            const container = document.getElementById('links-container');
            const url = input.value.trim();

            if (url !== "") {
                const card = document.createElement('div');
                card.className = 'link-card';
                
                // Проверка: картинка это или нет
                const isImage = /\.(jpg|jpeg|png|webp|avif|gif)$/i.test(url);
                let content = `<a href="${url}" target="_blank" style="color:var(--primary)">${url}</a>`;
                
                if (isImage) {
                    content += `<img src="${url}" class="preview-img" onerror="this.style.display='none'">`;
                }

                card.innerHTML = `
                    <div style="font-size:0.8rem; margin-bottom:5px; color:#8b949e">Отправлено: ${userName}</div>
                    ${content}
                    <br><button class="btn" style="padding:4px 8px; font-size:0.7rem;" onclick="navigator.clipboard.writeText('${url}')">Копировать ссылку</button>
                `;
                
                container.prepend(card);
                input.value = "";
            }
        }
    </script>
</body>
</html>
